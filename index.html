<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streech Editor</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/loading.css">
</head>
<body>

  <!-- ⏳ 本家オマージュロード画面（指定のグリーン #00d631） -->
  <div id="loading-screen">
    <div class="loading-animation-container">
      <div id="load-block-1" class="loading-block"></div>
      <div id="load-block-2" class="loading-block"></div>
    </div>
  </div>

  <!-- ナビゲーションバー -->
  <header>
    <div class="header-left">
      <div class="logo-container">
        <img src="/streechlogo.svg" alt="Streech" class="logo-image">
      </div>
      <div class="menu-item">ファイル</div>
      <div class="menu-item">編集</div>
      <div class="menu-item">チュートリアル</div>
    </div>
  </header>

  <!-- メインエディタ領域（3分割レイアウト） -->
  <div id="main-container">
    
    <!-- 左側＆中央：プログラムワークスペース -->
    <section id="blockly-section">
      <div id="blocklyDiv"></div>
    </section>
    
    <!-- 右側：ステージ ＆ 管理マネージャー -->
    <section id="sidebar-section">
      
      <!-- ステージヘッダー（コントロール群） -->
      <div class="stage-header">
        <div class="control-bar">
          <button id="run-btn" class="control-btn" title="プロジェクトを実行">
            <svg viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6h-5.6z"/></svg>
          </button>
          <button id="pause-btn" class="control-btn" title="一時停止">
            <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button id="stop-btn" class="control-btn" title="完全に停止">
            <svg viewBox="0 0 24 24"><path d="M15.73 3H8.27L3 8.27v7.46L8.27 21h7.46L21 15.73V8.27L15.73 3z"/></svg>
          </button>
          <button id="debug-btn" class="control-btn" title="デバッグモード起動">
            <img src="/debug.svg" alt="Debug" class="debug-image">
          </button>
        </div>
      </div>

      <!-- 右上：ステージエリア（4:3サイズ） -->
      <div id="stage-area">
        <div id="canvas-mock">
          <div class="sprite-mock-cat">Sprite1</div>
        </div>
      </div>
      
      <!-- 右下：スプライト・背景アセットマネージャー -->
      <div id="asset-manager">
        <div class="asset-info-bar">
          <div class="info-item">スプライト <input type="text" class="info-input" value="Sprite1" style="width:70px; border-radius:6px; text-align:left; padding-left:6px;"></div>
          <div class="info-item">X <input type="text" class="info-input" value="0"></div>
          <div class="info-item">Y <input type="text" class="info-input" value="0"></div>
          <div class="info-item">大きさ <input type="text" class="info-input" value="100"></div>
          <div class="info-item">向き <input type="text" class="info-input" value="90"></div>
        </div>
        
        <div class="manager-panes">
          <div class="sprites-pane">
            <div id="asset1" class="asset-card active">
              <div class="asset-icon-placeholder" style="background: rgba(76, 151, 255, 0.1);"></div>
              <span>Sprite1</span>
            </div>
            <div id="asset2" class="asset-card">
              <div class="asset-icon-placeholder"></div>
              <span>Sprite2</span>
            </div>
          </div>
          
          <div class="stage-pane">
            <span>ステージ</span>
            <div class="stage-card">
              <div class="stage-icon-placeholder"></div>
              <span>背景1</span>
            </div>
          </div>
        </div>
      </div>

    </section>
  </div>

  <!-- Blockly表示用のダミー定義 -->
  <xml id="toolbox" style="display: none">
    <category name="動き" color="#4C97FF"></category>
    <category name="見た目" color="#9966FF"></category>
    <category name="音" color="#D65CD6"></category>
    <category name="制御" color="#FFAB19"></category>
  </xml>

  <script type="module" src="/main.js"></script>
</body>
</html>
