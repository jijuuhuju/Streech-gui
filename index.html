<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streech Editor</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- 🟢 ナビゲーションバー（指定のグリーン #00d631） -->
  <header>
    <div class="header-left">
      <div class="logo-container">
        <img src="./streechlogo.svg" alt="Streech" class="logo-image">
      </div>
      <div class="menu-item">ファイル</div>
      <div class="menu-item">編集</div>
      <div class="menu-item">チュートリアル</div>
    </div>
    
    <div class="header-right">
      <button id="debug-btn" class="nav-debug-btn" title="デバッグモード起動">
        <!-- 🛠️ 大文字の Debug.svg に正確に修正 -->
        <img src="./Debug.svg" alt="Debug" class="nav-debug-img">
        <span>デバッグ</span>
      </button>
    </div>
  </header>

  <!-- メインエディタ領域（本家Scratchと全く同じレイアウト構造） -->
  <div id="main-container">
    
    <!-- 🧱 ブロックプログラミングエリア -->
    <section id="blockly-section">
      <!-- 左端のカテゴリ選択縦帯 -->
      <div class="category-sidebar">
        <div class="category-item active"><div class="circle" style="background: #4C97FF;"></div>動き</div>
        <div class="category-item"><div class="circle" style="background: #9966FF;"></div>見た目</div>
        <div class="category-item"><div class="circle" style="background: #D65CD6;"></div>音</div>
        <div class="category-item"><div class="circle" style="background: #FFD000;"></div>イベント</div>
        <div class="category-item"><div class="circle" style="background: #FFAB19;"></div>制御</div>
      </div>

      <!-- ブロックパレット（スクロール領域） -->
      <div class="block-palette">
        <div class="palette-header">動き</div>
        
        <div class="streech-block block-motion" draggable="true">
          <input type="text" class="block-input" value="10" size="2">
          <span>歩動かす</span>
        </div>

        <div class="streech-block block-motion" draggable="true">
          <!-- 🛠️ ブロック内の矢印アイコンも大文字の Stop2.svg に修正 -->
          <img src="./Stop2.svg" class="block-arrow-icon" style="transform: rotate(90deg); filter: brightness(0) invert(1); width:12px; height:12px; margin-right:2px;">
          <input type="text" class="block-input" value="15" size="2">
          <span>度回す</span>
        </div>

        <div class="streech-block block-motion" draggable="true">
          <img src="./Stop2.svg" class="block-arrow-icon" style="transform: scaleX(-1) rotate(90deg); filter: brightness(0) invert(1); width:12px; height:12px; margin-right:2px;">
          <input type="text" class="block-input" value="15" size="2">
          <span>度回す</span>
        </div>
      </div>

      <!-- 中央：広大なワークスペース領域 -->
      <div class="block-workspace">
        <div class="workspace-empty-text">ここにブロックをドラッグして組み立てます</div>
      </div>
    </section>
    
    <!-- 右側：ステージと各種アセットの管理マネージャー -->
    <section id="sidebar-section">
      
      <!-- ステージヘッダー -->
      <div class="stage-header">
        <div class="control-bar">
          <!-- 実行 (flag.svg) -->
          <button id="run-btn" class="control-btn" title="プロジェクトを実行">
            <img src="./flag.svg" alt="Run" class="control-img">
          </button>
          <!-- 一時停止 (🛠️ 大文字の Stop2.svg に修正) -->
          <button id="pause-btn" class="control-btn" title="一時停止">
            <img src="./Stop2.svg" alt="Pause" class="control-img">
          </button>
          <!-- 完全停止 (🛠️ 大文字の Stop.svg に修正) -->
          <button id="stop-btn" class="control-btn" title="完全に停止">
            <img src="./Stop.svg" alt="Stop" class="control-img">
          </button>
        </div>
      </div>

      <!-- 右上：ステージエリア（4:3サイズ比） -->
      <div id="stage-area">
        <div id="canvas-mock">
          <div class="sprite-mock-cat">
            Sprite1
          </div>
        </div>
      </div>
      
      <!-- 右下：スプライト・背景アセットマネージャー -->
      <div id="asset-manager">
        <div class="asset-info-bar">
          <div class="info-item">スプライト <input type="text" class="info-input" value="Sprite1" style="width:70px; border-radius:6px; text-align:left; padding-left:6px;"></div>
          <div class="info-item">x <input type="text" class="info-input" value="0"></div>
          <div class="info-item">y <input type="text" class="info-input" value="0"></div>
          <div class="info-item">大きさ <input type="text" class="info-input" value="100"></div>
          <div class="info-item">向き <input type="text" class="info-input" value="90"></div>
        </div>
        
        <div class="manager-panes">
          <div class="sprites-pane">
            <div id="asset1" class="asset-card active">
              <div class="asset-icon-placeholder" style="background: rgba(76, 151, 255, 0.1);"></div>
              <span>Sprite1</span>
            </div>
            <div id="asset2" class="asset-card">
              <div class="asset-icon-placeholder"></div>
              <span>Sprite2</span>
            </div>
          </div>
          
          <div class="stage-pane">
            <span>ステージ</span>
            <div class="stage-card">
              <div class="stage-icon-placeholder"></div>
              <span>背景1</span>
            </div>
          </div>
        </div>
      </div>

    </section>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
